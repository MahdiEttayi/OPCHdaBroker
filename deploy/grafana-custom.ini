#################################### Paths ####################################
[paths]
# Extra plugin directories — user-installed plugins live here
plugins = C:\Users\Admin\grafana-plugins

#################################### Server ####################################
[server]
http_port = 3000

#################################### Security ##################################
[security]
# Allow the Infinity datasource plugin (signed by Grafana, but loading from
# a non-default path requires this on some builds)
allow_embedding = true

#################################### Plugins ##################################
[plugins]
# Infinity is signed by Grafana Labs so this is not strictly needed,
# but keeps things smooth if the signature check has any path issue.
allow_loading_unsigned_plugins = yesoreyeram-infinity-datasource

#################################### Unified Alerting #########################
[unified_alerting]
enabled = false
